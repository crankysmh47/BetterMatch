
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dna-green: #1D9E75;
    --dna-green-light: #E1F5EE;
    --dna-green-mid: #5DCAA5;
    --dna-amber: #BA7517;
    --dna-amber-light: #FAEEDA;
    --dna-coral: #D85A30;
    --dna-coral-light: #FAECE7;
    --dna-blue: #185FA5;
    --dna-blue-light: #E6F1FB;
    --dna-purple: #534AB7;
    --dna-purple-light: #EEEDFE;
    --bg: var(--color-background-primary);
    --bg2: var(--color-background-secondary);
    --border: var(--color-border-tertiary);
    --text: var(--color-text-primary);
    --muted: var(--color-text-secondary);
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Fraunces', serif;
  }

  body { font-family: var(--font-sans); background: transparent; color: var(--text); }

  .spec-root { padding: 2rem 0; }

  .spec-header {
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
  }

  .spec-title {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .spec-title span { color: var(--dna-green); font-style: italic; }

  .spec-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .progress-bar {
    display: flex;
    gap: 3px;
    margin-top: 1rem;
  }

  .progress-seg {
    height: 3px;
    flex: 1;
    border-radius: 2px;
  }

  .legend-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--bg2);
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section {
    margin-bottom: 2.5rem;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .section-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    flex-shrink: 0;
    font-family: var(--mono);
  }

  .section-title {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 500;
    flex: 1;
  }

  .section-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .chevron {
    width: 16px;
    height: 16px;
    transition: transform 0.2s;
    color: var(--muted);
  }

  .chevron.open { transform: rotate(90deg); }

  .section-body { display: none; }
  .section-body.open { display: block; }

  .task-group {
    margin-bottom: 1rem;
  }

  .task-group-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.5rem 0 0.4rem;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 0.5rem;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 0.5px solid var(--border);
  }

  .task:last-child { border-bottom: none; }

  .task-check {
    width: 16px;
    height: 16px;
    border: 0.5px solid var(--border);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    background: var(--bg);
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }

  .task-check.checked {
    background: var(--dna-green);
    border-color: var(--dna-green);
  }

  .task-check.checked::after {
    content: '';
    position: absolute;
    left: 3px;
    top: 1px;
    width: 8px;
    height: 5px;
    border-left: 1.5px solid white;
    border-bottom: 1.5px solid white;
    transform: rotate(-45deg);
  }

  .task-content { flex: 1; min-width: 0; }

  .task-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }

  .task-text.checked-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 500;
  }

  .tag-algo { background: var(--dna-green-light); color: #085041; }
  .tag-ui { background: var(--dna-blue-light); color: #0C447C; }
  .tag-backend { background: var(--dna-amber-light); color: #633806; }
  .tag-data { background: var(--dna-coral-light); color: #4A1B0C; }
  .tag-test { background: var(--dna-purple-light); color: #3C3489; }
  .tag-critical { background: #FCEBEB; color: #501313; }
  .tag-design { background: #FBEAF0; color: #4B1528; }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--bg2);
    border-radius: var(--border-radius-md);
    padding: 0.75rem 1rem;
    text-align: center;
  }

  .stat-num {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    display: block;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .total-progress {
    background: var(--bg2);
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--border);
    padding: 1rem 1.25rem;
    margin-bottom: 2rem;
  }

  .progress-track {
    height: 6px;
    background: var(--bg2);
    border-radius: 3px;
    overflow: hidden;
    border: 0.5px solid var(--border);
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    background: var(--dna-green);
    border-radius: 3px;
    transition: width 0.3s;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 0.5px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--dna-green-light);
    color: #085041;
    border-color: var(--dna-green-mid);
  }

  .collapse-all-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 0.5px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    margin-left: auto;
  }

  .dna-strand {
    display: flex;
    gap: 2px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .dna-base {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
  }

  .base-A { background: #E1F5EE; color: #085041; }
  .base-T { background: #FAEEDA; color: #633806; }
  .base-G { background: #EEEDFE; color: #3C3489; }
  .base-C { background: #FAECE7; color: #4A1B0C; }
</style>

<div class="spec-root">
  <h2 class="sr-only">GenAlign complete project specification and todo list</h2>

  <div class="spec-header">
    <div class="spec-title">GenAlign — <span>Complete Project Spec</span></div>
    <div class="spec-sub">CS-251 DAA · NUST · Every task defined</div>
    <div class="dna-strand" id="dnaDecor"></div>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:var(--dna-green)"></div> Algorithm</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--dna-blue)"></div> UI / Frontend</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--dna-amber)"></div> Backend</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--dna-coral)"></div> Data</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--dna-purple)"></div> Testing</div>
      <div class="legend-item"><div class="legend-dot" style="background:#E24B4A"></div> Critical path</div>
      <div class="legend-item"><div class="legend-dot" style="background:#D4537E"></div> Design</div>
    </div>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="total-progress">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span style="font-size:13px; font-weight:500;">Overall completion</span>
      <span style="font-family:var(--mono); font-size:12px; color:var(--muted);" id="pctLabel">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label"><span id="doneCount">0 done</span><span id="totalCount">0 total</span></div>
  </div>

  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="algo">Algorithm</button>
    <button class="filter-btn" data-filter="ui">UI</button>
    <button class="filter-btn" data-filter="backend">Backend</button>
    <button class="filter-btn" data-filter="data">Data</button>
    <button class="filter-btn" data-filter="test">Testing</button>
    <button class="filter-btn" data-filter="critical">Critical</button>
    <button class="collapse-all-btn" id="collapseAll">Collapse all</button>
    <button type="button" class="collapse-all-btn" id="uncheckAll" title="Clear every checkmark (saved in this browser)">Uncheck all</button>
  </div>

  <div id="sectionsContainer"></div>
</div>

<script>
const SECTIONS = [
  {
    id: "theme",
    icon: "TH",
    color: "#D4537E",
    iconBg: "#FBEAF0",
    title: "Theme, Design Language & Branding",
    tasks: [
      {
        group: "Visual identity",
        items: [
          { text: "Name: GenAlign. Tagline: 'Where sequences meet.' Displayed in header at all times.", tags: ["design","critical"] },
          { text: "Primary theme: Deep-sea bioluminescence. Dark navy background (#050E1A) with luminous teal/green accents that mimic glowing DNA. Rationale: DNA sequencing tools are used in darkened lab environments; bioluminescence is the colour palette of life itself at the molecular level.", tags: ["design","critical"] },
          { text: "Font 1 — Display: Fraunces (Google Fonts, serif, italic weight for titles). Used for: page title, section headings, alignment score display.", tags: ["design"] },
          { text: "Font 2 — Monospace: IBM Plex Mono. Used for: all sequence text, all DP matrix cell values, scores, position indices, FASTA input fields, tooltips inside matrix.", tags: ["design","critical"] },
          { text: "Font 3 — Body: Outfit (Google Fonts, clean humanist sans). Used for: all prose, labels, buttons, descriptions.", tags: ["design"] },
          { text: "Colour tokens (CSS vars): --bg-deep:#050E1A, --bg-surface:#0C1A2E, --bg-card:#112038, --accent-teal:#1BFFB8, --accent-green:#00E676, --accent-amber:#FFB700, --accent-coral:#FF5C57, --base-A:#1BFFB8, --base-T:#FFB700, --base-G:#957FEF, --base-C:#FF5C57, --match-green:#00E676, --mismatch-red:#FF5C57, --gap-amber:#FFB700, --text-primary:#E8F5F0, --text-muted:#6B8FA8, --border-dim:rgba(27,255,184,0.12).", tags: ["design","critical"] },
          { text: "Each nucleotide base (A/T/G/C) has a fixed dedicated colour used everywhere consistently: A=teal, T=amber, G=purple, C=coral. This extends to FASTA input highlighting, DP matrix cell tinting, alignment output colouring, and the decorative DNA strand in the header.", tags: ["design","critical"] },
          { text: "Scrollbar styled: thin (4px), thumb colour --accent-teal at 40% opacity, track transparent.", tags: ["design"] },
          { text: "Custom mouse cursor: default OS cursor retained; no custom cursor to avoid accessibility issues.", tags: ["design"] },
          { text: "Favicon: SVG double-helix icon, teal on transparent background, 32×32.", tags: ["design"] },
          { text: "Page title tag: 'GenAlign — Sequence Alignment Platform'.", tags: ["design"] },
        ]
      },
      {
        group: "Motion principles",
        items: [
          { text: "Page load: staggered fade-in-up of header, input panel, then output panel. Duration 400ms per element, 80ms delay between. Easing: cubic-bezier(0.16,1,0.3,1).", tags: ["design"] },
          { text: "DP matrix cell fill animation: cells illuminate in wave order (row by row, left to right) with a 3ms delay per cell. Glow pulse on maximum-score cells.", tags: ["design","ui"] },
          { text: "Traceback path draw: after matrix fills, the optimal path is drawn as a glowing line animating from start to end cell over 600ms.", tags: ["design","ui"] },
          { text: "Alignment output: character pairs fade in sequentially at 8ms intervals to mimic a sequencing machine printing results.", tags: ["design","ui"] },
          { text: "All hover transitions: 150ms ease. All colour transitions: 200ms ease. No transition exceeds 600ms to avoid sluggishness.", tags: ["design"] },
        ]
      }
    ]
  },
  {
    id: "layout",
    icon: "LY",
    color: "#185FA5",
    iconBg: "#E6F1FB",
    title: "Page Layout & Navigation Structure",
    tasks: [
      {
        group: "Global shell",
        items: [
          { text: "Single-page application (React SPA). No page reloads. All views are React components rendered into a root div.", tags: ["ui","critical"] },
          { text: "Top navbar: fixed, 56px tall, dark (--bg-surface), blur backdrop-filter:blur(12px). Contains: GenAlign logo left, nav links centre, GitHub icon right.", tags: ["ui"] },
          { text: "Nav links: 'Align' (main tool), 'Algorithms' (explainer), 'Benchmark' (performance charts), 'About'. Active link has underline in --accent-teal.", tags: ["ui"] },
          { text: "Layout splits into a LEFT PANEL (40% width, sequence inputs + algorithm config) and RIGHT PANEL (60% width, results + visualiser). On viewport < 900px panels stack vertically.", tags: ["ui","critical"] },
          { text: "Footer: 40px, dark, shows: 'GenAlign · CS-251 DAA · NUST · 2026' and team member names. No other content.", tags: ["ui"] },
          { text: "Toast notification system: bottom-right corner, max 3 toasts stacked, auto-dismiss 4s, slide-in from right animation. Used for: copy success, job queued, error messages.", tags: ["ui"] },
        ]
      },
      {
        group: "Left input panel",
        items: [
          { text: "Panel label: 'Sequences' in small monospaced uppercase, teal, at top.", tags: ["ui"] },
          { text: "Sequence A textarea: 200px tall, monospace font, dark background (--bg-card), teal border on focus. Placeholder: '>seq_A\\nACGTACGTACGT'. Character count badge shown bottom-right of textarea, updates live.", tags: ["ui","critical"] },
          { text: "Sequence B textarea: identical styling to Sequence A.", tags: ["ui","critical"] },
          { text: "Each textarea has a nucleotide colouring toggle (button top-right of textarea): when ON, each character is wrapped in a coloured span (A=teal, T=amber, G=purple, C=coral) using a contentEditable div replacing the textarea. When OFF, plain text.", tags: ["ui"] },
          { text: "FASTA file upload button below each textarea: clicking opens file picker filtered to .fasta/.fa/.txt. On file select, sequences parsed by BioPython backend and first sequence populated into the textarea. Loading spinner shown during parse.", tags: ["ui","backend"] },
          { text: "Swap sequences button (↕ icon) between the two textareas: swaps content of A and B with a 200ms slide animation.", tags: ["ui"] },
          { text: "Sequence validation: real-time. Invalid characters (anything not A/T/G/C/U/N for DNA, or valid amino acids for protein mode) highlighted in coral red. A warning badge 'Invalid characters detected' appears below textarea.", tags: ["ui","critical"] },
          { text: "Mode toggle: DNA / Protein. Switches validation rules and scoring matrix. DNA uses match/mismatch scores; Protein uses BLOSUM62.", tags: ["ui","critical"] },
        ]
      },
      {
        group: "Algorithm config panel",
        items: [
          { text: "Section label: 'Algorithm' in small monospaced uppercase.", tags: ["ui"] },
          { text: "Algorithm selector: four large card-style radio buttons horizontally. Cards: Needleman-Wunsch, Smith-Waterman, Hirschberg, Gotoh. Each card shows: algorithm name (Fraunces font), type badge (Global/Local), time complexity badge, space complexity badge. Selected card glows teal outline.", tags: ["ui","critical"] },
          { text: "Hovering an algorithm card shows a 200px tooltip popup with: one-line description, key use case, and a mini ASCII illustration of alignment type.", tags: ["ui"] },
          { text: "Scoring parameters sub-panel (shown below algorithm cards):", tags: ["ui"] },
          { text: "Match score slider: range 0–10, default 2. Shows current value. Label: 'Match reward'.", tags: ["ui"] },
          { text: "Mismatch score slider: range -10–0, default -1. Label: 'Mismatch penalty'.", tags: ["ui"] },
          { text: "Gap open penalty slider: range -20–0, default -2. Label: 'Gap open'. Disabled (greyed) when algorithm is NW, SW, or Hirschberg (only active for Gotoh).", tags: ["ui","critical"] },
          { text: "Gap extend penalty slider: range -10–0, default -0.5. Label: 'Gap extend'. Same disable logic as gap open.", tags: ["ui","critical"] },
          { text: "Gap penalty slider (linear): range -10–0, default -1. Shown for NW/SW/Hirschberg; hidden for Gotoh (replaced by open+extend above).", tags: ["ui","critical"] },
          { text: "Scoring matrix selector (Protein mode only): dropdown with options BLOSUM62, BLOSUM45, BLOSUM80, PAM250. Shows a 6×6 preview grid of the selected matrix on hover.", tags: ["ui"] },
          { text: "Banded DP toggle checkbox: 'Use banded DP (faster for similar sequences)'. When checked shows a bandwidth slider: range 1–500, default 50. Only enabled for NW and Hirschberg; hidden for SW (doesn't apply) and Gotoh (separate implementation).", tags: ["ui","critical"] },
          { text: "Show DP matrix toggle: checkbox defaulting ON. When OFF, DP matrix visualiser tab is hidden from results.", tags: ["ui"] },
          { text: "Align button: full width, 48px tall, green gradient background, white text, 'Run Alignment' label with a ▶ icon. Disabled (greyed) when sequences are empty or contain invalid characters. Shows loading spinner while request is in flight.", tags: ["ui","critical"] },
        ]
      }
    ]
  },
  {
    id: "algorithms",
    icon: "AL",
    color: "#1D9E75",
    iconBg: "#E1F5EE",
    title: "Algorithm Implementations (Core)",
    tasks: [
      {
        group: "Needleman-Wunsch",
        items: [
          { text: "Implement NW from scratch in Python 3.11. No use of BioPython alignment module.", tags: ["algo","critical"] },
          { text: "NW accepts: seq_a (str), seq_b (str), match (int), mismatch (int), gap_penalty (int). Returns: aligned_a (str), aligned_b (str), score (int), dp_matrix (2D list), traceback_path (list of (i,j) tuples).", tags: ["algo","critical"] },
          { text: "Initialise dp[0][0..n] and dp[0..m][0] with cumulative gap penalties.", tags: ["algo"] },
          { text: "Fill DP table nested loop: diagonal = dp[i-1][j-1]+score(a[i],b[j]), up = dp[i-1][j]+gap, left = dp[i][j-1]+gap. dp[i][j] = max of three.", tags: ["algo"] },
          { text: "Traceback: start at dp[m][n], walk back to dp[0][0] recording path. Build aligned_a and aligned_b strings with '-' for gaps.", tags: ["algo","critical"] },
          { text: "Support both DNA scoring (match/mismatch) and BLOSUM62 substitution matrix for protein mode. score() function checks mode and returns correct value.", tags: ["algo"] },
          { text: "Return the full dp_matrix as a JSON-serialisable 2D list (not numpy array) so it can be sent over the API.", tags: ["algo","backend"] },
          { text: "Write unit test: align 'GATTACA' vs 'GCATGCU' with match=1, mismatch=-1, gap=-1. Verify score and alignment string match known correct output.", tags: ["test"] },
          { text: "Write unit test: empty string input for seq_a. Expect aligned_a = '------', aligned_b = seq_b, score = len(seq_b)*gap.", tags: ["test"] },
          { text: "Write unit test: identical sequences. Expect alignment score = len(seq)*match with no gaps.", tags: ["test"] },
          { text: "Benchmark NW: measure time for sequence lengths [100,500,1000,2000,5000,10000]. Record in benchmark table.", tags: ["test","data"] },
        ]
      },
      {
        group: "Smith-Waterman",
        items: [
          { text: "Implement SW from scratch in Python 3.11.", tags: ["algo","critical"] },
          { text: "SW accepts same parameters as NW. Returns: aligned_a, aligned_b, score, dp_matrix, traceback_path, max_pos (i,j) where traceback starts.", tags: ["algo","critical"] },
          { text: "Key difference from NW: dp[i][j] = max(0, diagonal, up, left). Track max_score and max_pos during fill.", tags: ["algo","critical"] },
          { text: "Traceback starts at max_pos, stops when cell value reaches 0 (not when reaching dp[0][0]).", tags: ["algo","critical"] },
          { text: "The returned dp_matrix must also include which cells are inside the 'active region' (value > 0) as a separate boolean matrix for the visualiser to highlight.", tags: ["algo","ui"] },
          { text: "Write unit test: align 'TGTTACGG' vs 'GGTTGACTA'. Verify local alignment score and aligned substring match published result.", tags: ["test"] },
          { text: "Benchmark SW: same lengths as NW. Include in benchmark table.", tags: ["test","data"] },
        ]
      },
      {
        group: "Hirschberg",
        items: [
          { text: "Implement Hirschberg space-optimised algorithm from scratch.", tags: ["algo","critical"] },
          { text: "Implement NW_SCORE_LAST_ROW(seq_a, seq_b, gap): computes only the last row of DP using O(n) space. Returns list of n+1 scores.", tags: ["algo","critical"] },
          { text: "Implement HIRSCHBERG(seq_a, seq_b): recursively divide seq_a at midpoint, compute forward and backward last-row scores, find optimal split column, recurse on sub-problems.", tags: ["algo","critical"] },
          { text: "Base cases: len(seq_a)==0 → return all gaps for seq_b; len(seq_b)==0 → return all gaps for seq_a; len(seq_a)==1 → run NW directly.", tags: ["algo","critical"] },
          { text: "Verify memory usage using tracemalloc: aligning two 10,000-character sequences should use < 5MB (vs ~800MB for full NW matrix).", tags: ["algo","test","critical"] },

  return idxs.map((ii) => `${sec.id}_${tg.group}_${ii}`);
});
/** Bump when CODEBASE_VERIFIED_MARKERS changes so new IDs are seeded once per browser. */
const CODEBASE_VERIFIED_SEED_VERSION = 'verified_132_hf_vercel_v10';

/** New key (May 2026): previous key implied “complete”; this starts honest / empty until you check items. */
const SPEC_STORAGE_KEY = 'genalign_spec_checks_v_manual_2026';
const LEGACY_SPEC_KEYS = ['genalign_spec_checks_v_complete_2026'];

let checkedState = {};

try {
  LEGACY_SPEC_KEYS.forEach((k) => {
    try {
      localStorage.removeItem(k);
    } catch (e) {}
  });
  const saved = localStorage.getItem(SPEC_STORAGE_KEY);
  if (saved) checkedState = JSON.parse(saved);
} catch (e) {}

function applyCodebaseVerifiedChecks() {
  try {
    const seedKey = 'genalign_spec_verified_seed_' + CODEBASE_VERIFIED_SEED_VERSION;
    if (localStorage.getItem(seedKey)) return;
    CODEBASE_VERIFIED_TASK_IDS.forEach((tid) => {
      checkedState[tid] = true;
    });
    localStorage.setItem(seedKey, '1');
    saveState();
  } catch (e) {}
}

applyCodebaseVerifiedChecks();

function saveState() {
  try { localStorage.setItem(SPEC_STORAGE_KEY, JSON.stringify(checkedState)); } catch(e) {}
}

function getCheckedCount() {
  return Object.values(checkedState).filter(Boolean).length;
}

function updateProgress() {
  const done = getCheckedCount();
  const pct = totalTasks > 0 ? Math.round(done / totalTasks * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('pctLabel').textContent = pct + '%';
  document.getElementById('doneCount').textContent = done + ' done';
  document.getElementById('totalCount').textContent = totalTasks + ' total';
  updateStats();
}

function updateStats() {
  const done = getCheckedCount();
  const remaining = totalTasks - done;
  const sections = SECTIONS.length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><span class="stat-num">${totalTasks}</span><div class="stat-label">Total tasks</div></div>
    <div class="stat-card"><span class="stat-num" style="color:var(--dna-green)">${done}</span><div class="stat-label">Completed</div></div>
    <div class="stat-card"><span class="stat-num" style="color:var(--dna-amber)">${remaining}</span><div class="stat-label">Remaining</div></div>
    <div class="stat-card"><span class="stat-num">${sections}</span><div class="stat-label">Sections</div></div>
  `;
}

let activeFilter = 'all';

function tagMatchesFilter(tags, filter) {
  if (filter === 'all') return true;
  return tags.includes(filter);
}

function renderSections() {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';

  SECTIONS.forEach(sec => {
    const visibleCount = sec.tasks.reduce((sum, g) => {
      return sum + g.items.filter(it => tagMatchesFilter(it.tags, activeFilter)).length;
    }, 0);
    if (visibleCount === 0) return;

    const secEl = document.createElement('div');
    secEl.className = 'section';
    secEl.dataset.secId = sec.id;

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <div class="section-icon" style="background:${sec.iconBg};color:${sec.color}">${sec.icon}</div>
      <div class="section-title">${sec.title}</div>
      <div class="section-count">${visibleCount} tasks</div>
      <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="6,4 10,8 6,12"/>
      </svg>
    `;

    const body = document.createElement('div');
    body.className = 'section-body open';

    sec.tasks.forEach(group => {
      const visCount = group.items.filter((it) => tagMatchesFilter(it.tags, activeFilter)).length;
      if (visCount === 0) return;

      const groupEl = document.createElement('div');
      groupEl.className = 'task-group';
      groupEl.innerHTML = `<div class="task-group-label">${group.group}</div>`;

      group.items.forEach((item, idx) => {
        if (!tagMatchesFilter(item.tags, activeFilter)) return;
        const taskId = `${sec.id}_${group.group}_${idx}`;
        const isChecked = !!checkedState[taskId];

        const taskEl = document.createElement('div');
        taskEl.className = 'task';

        const check = document.createElement('div');
        check.className = 'task-check' + (isChecked ? ' checked' : '');
        check.addEventListener('click', () => {
          checkedState[taskId] = !checkedState[taskId];
          check.classList.toggle('checked', checkedState[taskId]);
          textEl.classList.toggle('checked-text', checkedState[taskId]);
          saveState();
          updateProgress();
        });

        const content = document.createElement('div');
        content.className = 'task-content';

        const textEl = document.createElement('div');
        textEl.className = 'task-text' + (isChecked ? ' checked-text' : '');
        textEl.textContent = item.text;

        const metaEl = document.createElement('div');
        metaEl.className = 'task-meta';
        item.tags.forEach(tag => {
          const tagEl = document.createElement('span');
          tagEl.className = `tag tag-${tag}`;
          tagEl.textContent = tag;
          metaEl.appendChild(tagEl);
        });

        content.appendChild(textEl);
        content.appendChild(metaEl);
        taskEl.appendChild(check);
        taskEl.appendChild(content);
        groupEl.appendChild(taskEl);
      });

      body.appendChild(groupEl);
    });

    header.addEventListener('click', () => {
      const chevron = header.querySelector('.chevron');
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);
      chevron.classList.toggle('open', !isOpen);
    });

    const chevronEl = header.querySelector('.chevron');
    chevronEl.classList.add('open');

    secEl.appendChild(header);
    secEl.appendChild(body);
    container.appendChild(secEl);
  });
}

document.getElementById('filterRow').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  renderSections();
});

document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.section-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.chevron').forEach(c => c.classList.remove('open'));
});

document.getElementById('uncheckAll').addEventListener('click', () => {
  checkedState = {};
  saveState();
  renderSections();
  updateProgress();
});

const bases = 'ATGCATGCGATCGATCGTAGCTAGCTAGCTGCATGCATGC';
const dnaDecor = document.getElementById('dnaDecor');
bases.split('').forEach(b => {
  const el = document.createElement('div');
  el.className = `dna-base base-${b}`;
  el.textContent = b;
  dnaDecor.appendChild(el);
});

renderSections();
updateProgress();
</script>
