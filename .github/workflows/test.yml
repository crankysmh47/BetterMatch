name: Test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  algorithms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt && pytest -q --cov=algorithms --cov-config=.coveragerc --cov-fail-under=90
        working-directory: apps/api

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
